services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: journal-backend
    ports:
      - "3001:3001"
    volumes:
      - ./server/entries.json:/app/entries.json
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: journal-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
