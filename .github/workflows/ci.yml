name: CI Pipline

on:
    push:
        branches: ["**"]
    pull_request:
        branches: [main, develop]
jobs:
    build:
        name: Lint and Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node JS
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "npm"
            - name: Install Frontend dependencies
              run: npm install

            - name: Lint frontend
              run: npm run lint

            - name: Build Frontend
              run: npm run build

            - name: Install backend dependencies
              run: npm install
              working-directory: ./server

    # ── JOB 2: Docker Build and Push ───────────────
    docker:
        name: Build and Push Docker Images
        runs-on: ubuntu-latest
        needs: build # waits for Job 1 to pass
        if: github.ref == 'refs/heads/main' # only on main

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push backend
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: Dockerfile.backend
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/journal-backend:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/journal-backend:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            - name: Build and push frontend
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: Dockerfile.frontend
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/journal-frontend:latest
                      ${{ secrets.DOCKERHUB_USERNAME }}/journal-frontend:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            - name: Print image info
              run: |
                  echo "✅ Backend: ${{ secrets.DOCKERHUB_USERNAME }}/journal-backend:${{ github.sha }}"
                  echo "✅ Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/journal-frontend:${{ github.sha }}"
