apiVersion: v1
kind: Service
metadata:
  name: journal-backend
  labels:
    app: journal-backend
spec:
  type: ClusterIP # only accessible inside the cluster
  selector:
    app: journal-backend # routes traffic to pods with this label
  ports:
  - name: http
    port: 3001 # port the service listens on
    targetPort: 3001 # port on the pod to forward to
    protocol: TCP
